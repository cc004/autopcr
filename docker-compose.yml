services:
  autopcr:
    image: ghcr.io/cc004/autopcr:latest
    container_name: autopcr
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "${HOST_PORT:-13200}:${AUTOPCR_SERVER_PORT:-13200}"
    environment:
      - AUTOPCR_SERVER_HOST=${AUTOPCR_SERVER_HOST:-0.0.0.0}
      - AUTOPCR_SERVER_PORT=${AUTOPCR_SERVER_PORT:-13200}
      - AUTOPCR_SERVER_DEBUG_LOG=${AUTOPCR_SERVER_DEBUG_LOG:-false}
      - AUTOPCR_SERVER_ALLOW_REGISTER=${AUTOPCR_SERVER_ALLOW_REGISTER:-true}
      - AUTOPCR_SERVER_SUPERUSER=${AUTOPCR_SERVER_SUPERUSER:-}
      - AUTOPCR_PUBLIC_ADDRESS=${AUTOPCR_PUBLIC_ADDRESS:-}
      - AUTOPCR_USE_HTTPS=${AUTOPCR_USE_HTTPS:-false}
      - AUTOPCR_TW_APP_VERSION=${AUTOPCR_TW_APP_VERSION:-5.7.0}
      - AUTOPCR_TW_RES_VERSION=${AUTOPCR_TW_RES_VERSION:-00500030}
      - AUTOPCR_TW_UNITY_VERSION=${AUTOPCR_TW_UNITY_VERSION:-6000.0.58f2}
      - AUTOPCR_TW_CURL_VERSION=${AUTOPCR_TW_CURL_VERSION:-8.10.1-DEV}
      - AUTOPCR_TW_USE_SYSTEM_PROXY=${AUTOPCR_TW_USE_SYSTEM_PROXY:-false}
      - AUTOPCR_TW_DEVICE_ID=${AUTOPCR_TW_DEVICE_ID:-}
      - AUTOPCR_TW_API_ROOT=${AUTOPCR_TW_API_ROOT:-}
      - AUTOPCR_TW_OFFICIAL_DB=${AUTOPCR_TW_OFFICIAL_DB:-true}
      - AUTOPCR_TW_RESOURCE_BASE_URL=${AUTOPCR_TW_RESOURCE_BASE_URL:-https://img-pc.so-net.tw}
      - AUTOPCR_TW_DB_CHECK_INTERVAL=${AUTOPCR_TW_DB_CHECK_INTERVAL:-3600}
      - AUTOPCR_TW_DB_VERSION_URL=${AUTOPCR_TW_DB_VERSION_URL:-https://raw.githubusercontent.com/Expugn/priconne-database/master/version.json}
      - AUTOPCR_TW_DB_URL=${AUTOPCR_TW_DB_URL:-https://raw.githubusercontent.com/Expugn/priconne-database/master/master_tw.db}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - autopcr_cache:/app/cache
      - autopcr_result:/app/result
      - autopcr_log:/app/log
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${AUTOPCR_SERVER_PORT:-13200}/daily/login')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  autopcr_cache:
    driver: local
  autopcr_result:
    driver: local
  autopcr_log:
    driver: local
